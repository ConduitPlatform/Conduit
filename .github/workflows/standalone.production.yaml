on:
  release:
    types:
      - created

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    name: Build Conduit standalone
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to the Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Set env
        run: echo "RELEASE_VERSION=$(echo "${GITHUB_REF#refs/*/}" | sed 's/^v//')" >> "$GITHUB_ENV"
      - name: Build conduit base
        run: |
          docker build --no-cache -t conduit-base:latest -f ./Dockerfile .
      - name: Build standalone
        run: |
          docker build -t "ghcr.io/conduitplatform/conduit-standalone:${RELEASE_VERSION}" -f ./standalone.Dockerfile .
      - name: Push image
        run: |
          docker tag "ghcr.io/conduitplatform/conduit-standalone:${RELEASE_VERSION}" "conduitplatform/conduit-standalone:${RELEASE_VERSION}"
          docker push "ghcr.io/conduitplatform/conduit-standalone:${RELEASE_VERSION}"
          docker push "conduitplatform/conduit-standalone:${RELEASE_VERSION}"
          if [ "${{ github.event.release.prerelease }}" != "true" ]; then
            docker tag "ghcr.io/conduitplatform/conduit-standalone:${RELEASE_VERSION}" ghcr.io/conduitplatform/conduit-standalone:latest
            docker tag "ghcr.io/conduitplatform/conduit-standalone:${RELEASE_VERSION}" conduitplatform/conduit-standalone:latest
            docker push ghcr.io/conduitplatform/conduit-standalone:latest
            docker push conduitplatform/conduit-standalone:latest
          fi
