on:
  release:
    types:
      - created

permissions:
  id-token: write
  contents: read

jobs:
  publish_sdk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Set env
        run: |
          VERSION=$(echo "${GITHUB_REF#refs/*/}" | sed 's/^v//')
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          case "$VERSION" in
            *-alpha*) echo "NPM_TAG=alpha" >> "$GITHUB_ENV" ;;
            *-beta*) echo "NPM_TAG=beta" >> "$GITHUB_ENV" ;;
            *-rc*) echo "NPM_TAG=rc" >> "$GITHUB_ENV" ;;
            *) echo "NPM_TAG=" >> "$GITHUB_ENV" ;;
          esac
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '29.x'
      - name: install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Set version and publish
        run: |
          pnpm version "$RELEASE_VERSION" --no-git-tag-version
          publish_args=(--access public --no-git-checks)
          if [ -n "${NPM_TAG:-}" ]; then
            publish_args+=(--tag "$NPM_TAG")
          fi
          pnpm publish "${publish_args[@]}"
        working-directory: ./libraries/grpc-sdk
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"
  publish_module_tools:
    needs: publish_sdk
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Set env
        run: |
          VERSION=$(echo "${GITHUB_REF#refs/*/}" | sed 's/^v//')
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          case "$VERSION" in
            *-alpha*) echo "NPM_TAG=alpha" >> "$GITHUB_ENV" ;;
            *-beta*) echo "NPM_TAG=beta" >> "$GITHUB_ENV" ;;
            *-rc*) echo "NPM_TAG=rc" >> "$GITHUB_ENV" ;;
            *) echo "NPM_TAG=" >> "$GITHUB_ENV" ;;
          esac
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '29.x'
      - name: install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Set grpc-sdk version
        run: pnpm version "$RELEASE_VERSION" --no-git-tag-version
        working-directory: ./libraries/grpc-sdk
      - name: build the sdk
        run: pnpm exec turbo run build --filter=@conduitplatform/grpc-sdk --filter=@conduitplatform/module-tools
        env:
          pnpm_config_verify_deps_before_run: "false"
      - name: Set version and publish
        run: |
          pnpm version "$RELEASE_VERSION" --no-git-tag-version
          pnpm pack --pack-destination /tmp
          tgz=$(ls -t /tmp/conduitplatform-module-tools-*.tgz | head -1)
          pkg=$(tar -xOf "$tgz" package/package.json)
          peer=$(echo "$pkg" | jq -r '.peerDependencies["@conduitplatform/grpc-sdk"]')
          dep=$(echo "$pkg" | jq -r '.dependencies["@conduitplatform/grpc-sdk"] // empty')
          [ "$peer" = "$RELEASE_VERSION" ] && [ "$dep" = "$RELEASE_VERSION" ] || exit 1
          publish_args=(--access public --no-git-checks)
          if [ -n "${NPM_TAG:-}" ]; then
            publish_args+=(--tag "$NPM_TAG")
          fi
          pnpm publish "${publish_args[@]}"
        working-directory: ./libraries/module-tools
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"
