on:
  release:
    types:
      - created

permissions:
  id-token: write
  contents: read
env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    name: Deploy Conduit
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set env
        run: echo "RELEASE_VERSION=$(echo "${GITHUB_REF#refs/*/}" | sed 's/^v//')" >> "$GITHUB_ENV"
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to the Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build conduit modules
        run: make all IMAGE_TAG=${{ env.RELEASE_VERSION }}
  publish_sdk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Set env
        run: |
          VERSION=$(echo "${GITHUB_REF#refs/*/}" | sed 's/^v//')
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          case "$VERSION" in
            *-alpha*) echo "NPM_TAG=alpha" >> "$GITHUB_ENV" ;;
            *-beta*) echo "NPM_TAG=beta" >> "$GITHUB_ENV" ;;
            *-rc*) echo "NPM_TAG=rc" >> "$GITHUB_ENV" ;;
            *) echo "NPM_TAG=" >> "$GITHUB_ENV" ;;
          esac
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '29.x'
      - name: install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Set version and publish
        run: |
          pnpm version "$RELEASE_VERSION" --no-git-tag-version
          publish_args=(--access public --no-git-checks)
          if [ -n "${NPM_TAG:-}" ]; then
            publish_args+=(--tag "$NPM_TAG")
          fi
          pnpm publish "${publish_args[@]}"
        working-directory: ./libraries/grpc-sdk
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"
  publish_module_tools:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Set env
        run: |
          VERSION=$(echo "${GITHUB_REF#refs/*/}" | sed 's/^v//')
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          case "$VERSION" in
            *-alpha*) echo "NPM_TAG=alpha" >> "$GITHUB_ENV" ;;
            *-beta*) echo "NPM_TAG=beta" >> "$GITHUB_ENV" ;;
            *-rc*) echo "NPM_TAG=rc" >> "$GITHUB_ENV" ;;
            *) echo "NPM_TAG=" >> "$GITHUB_ENV" ;;
          esac
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '29.x'
      - name: install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: build the sdk
        run: npx turbo run build --filter=@conduitplatform/grpc-sdk --filter=@conduitplatform/module-tools
      - name: Set version and publish
        run: |
          pnpm version "$RELEASE_VERSION" --no-git-tag-version
          publish_args=(--access public --no-git-checks)
          if [ -n "${NPM_TAG:-}" ]; then
            publish_args+=(--tag "$NPM_TAG")
          fi
          pnpm publish "${publish_args[@]}"
        working-directory: ./libraries/module-tools
        env:
          NODE_AUTH_TOKEN: "${{ secrets.NPM_PUBLISH_TOKEN }}"
