  - '@aws-sdk/client-sesv2@3.1072.0'
  - '@aws-sdk/client-sns@3.1072.0'
  - '@aws-sdk/client-sts@3.1072.0'
  - '@aws-sdk/s3-request-presigner@3.1072.0'
  - '@onesignal/node-onesignal@5.9.0'
  - '@types/node@26.0.0'
  - pg-connection-string@2.14.0
  - pg-protocol@1.15.0
  - pg@8.22.0
