packages:
  - "packages/*"
  - "libraries/*"
  - "modules/*"
overrides:
  ioredis: 5.11.1
  dompurify: '>=3.4.9'
  hono: '>=4.12.11'
  '@hono/node-server': '>=1.19.13'
  fast-xml-parser: '>=5.7.0'
  node-forge: '>=1.3.2'
  nodemailer: '>=9.0.1'
  protobufjs: '>=7.6.4'
  minimatch: '>=9.0.7'
  minimist: '>=1.2.6'
  ws: '>=8.21.0'
  tmp: '>=0.2.4'
  uuid: '>=11.1.1'
  esbuild: '>=0.28.1'
  js-yaml: '>=4.1.2'

allowBuilds:
  '@apollo/protobufjs': true
  '@firebase/util': true
  bcrypt: true
  core-js: true
  esbuild: true
  keccak: true
  msgpackr-extract: true
  protobufjs: true
  secp256k1: true
  sqlite3: true
  unrs-resolver: true
  vue-demi: true
minimumReleaseAgeExclude:
